        .exit-modal-overlay.visible { display: flex; }
        .exit-modal { background: #fff; border-radius: 24px; padding: 40px 36px; max-width: 420px; width: 90%; text-align: center; }

        .chars-modal { background: #0D0D0D; border-radius: 24px; padding: 40px; max-width: 860px; width: 100%; max-height: 90vh; overflow-y: auto; }

        .chars-modal-title span { color: #F97316; }
        .chars-modal-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .chars-modal-close:hover { background: rgba(255,255,255,0.2); }
        .chars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .char-card { border-radius: 16px; overflow: hidden; position: relative; aspect-ratio: 3/4; display: flex; align-items: flex-end; }
        .char-card-bg { position: absolute; inset: 0; z-index: 0; }
        .char-card-img { position: absolute; inset: 0; z-index: 1; width: 100%; height: 100%; object-fit: contain; object-position: bottom center; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
        .char-card-overlay { position: absolute; inset: 0; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 55%); }
        .char-card-name { position: relative; z-index: 3; padding: 12px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: #fff; line-height: 1.2; }

        .result-card { display: none; border-radius: 24px; overflow: hidden; position: relative; min-height: 420px; }
        .result-card.visible { display: flex; }
        .result-card-bg-color { position: absolute; inset: 0; z-index: 0; }
        .result-card-left { position: relative; z-index: 1; flex: 1; padding: 40px 36px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to right, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.75) 70%, rgba(0,0,0,0) 100%); }
        .result-card-tag { display: inline-block; background: rgba(249,115,22,0.25); color: #F97316; font-size: 12px; font-weight: 500; padding: 4px 14px; border-radius: 99px; margin-bottom: 14px; border: 1px solid rgba(249,115,22,0.4); width: fit-content; }
        .result-card-eres { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 4px; font-weight: 500; }
        .result-card-name { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: #fff; letter-spacing: -1.5px; line-height: 1; margin-bottom: 16px; }
        .result-card-desc { font-size: 14px; color: rgba(255,255,255,0.72); line-height: 1.7; margin-bottom: 28px; max-width: 340px; }
        .result-card-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .result-btn-retry { background: #F97316; color: #fff; border: none; border-radius: 12px; padding: 12px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .result-btn-retry:hover { background: #EA6B0A; transform: translateY(-1px); }
        .result-btn-back { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 12px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .result-btn-back:hover { background: rgba(255,255,255,0.18); }
        .result-card-right { position: relative; z-index: 1; width: 280px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        .result-card-right img { width: 100%; height: 100%; object-fit: contain; object-position: bottom center; filter: drop-shadow(0 0 20px rgba(0,0,0,0.4)); }
    </style>
</head>
<body>

    <header class="qa-header" id="mainHeader">
        <div class="qa-logo" onclick="window.location.href='../inicio.html'">Quiz<span>App</span></div>
        <div class="qa-search">
            <span class="qa-search-icon">🔍</span>
            <input type="text" placeholder="Buscar un quiz..." autocomplete="off">
        </div>
        <nav class="qa-nav">
            <a href="../inicio.html">Inicio</a>
            <a href="../categorias.html">Categorías</a>
            <a href="#">Quizzes</a>
            <a href="#">Top</a>
        </nav>
    </header>

    <div class="quiz-wrap" id="quizWrap">
        <div class="quiz-progress-wrap">
            <div class="quiz-progress-top">
                <span class="quiz-progress-label">Minecraft · ¿Qué mob eres?</span>
                <span class="quiz-progress-num" id="progressNum">1 / 16</span>
            </div>
            <div class="quiz-progress-bar">
                <div class="quiz-progress-fill" id="progressFill" style="width: 6.25%;"></div>
            </div>
        </div>

        <div class="quiz-action-row">
            <button class="quiz-chars-btn" onclick="abrirPersonajes()">🎮 Mobs disponibles</button>

        </div>

        <div id="preguntaWrap">
            <div class="quiz-question" id="questionText"></div>
            <div class="quiz-options" id="optionsWrap"></div>
            <button class="quiz-next" id="nextBtn" onclick="nextQuestion()">Siguiente pregunta →</button>
        </div>

        <div class="result-card" id="resultCard">
            <div class="result-card-bg-color" id="resultBgColor"></div>
            <div class="result-card-left">
                <div class="result-card-tag">⛏️ Minecraft</div>

                <div class="result-card-desc" id="resultDesc"></div>
                <div class="result-card-btns">
                    <button class="result-btn-retry" onclick="restartQuiz()">Repetir quiz</button>

    </div>

    <div class="exit-modal-overlay" id="exitModal">

            <div class="exit-modal-btns">
                <button class="exit-modal-stay" onclick="cerrarModal()">Quedarse</button>
                <button class="exit-modal-leave" onclick="window.location.href='videojuegos.html'">✕ Salir</button>
            </div>
        </div>
    </div>

    <div class="chars-modal-overlay" id="charsModal">
        <div class="chars-modal">
            <div class="chars-modal-header">
                <div class="chars-modal-title">Mobs <span>disponibles</span></div>
                <button class="chars-modal-close" onclick="cerrarPersonajes()">✕</button>
            </div>
            <div class="chars-grid">
                <div class="char-card"><div class="char-card-bg" style="background:#2D5A1B;"></div><img class="char-card-img" src="img/creeper.webp" alt="Creeper"><div class="char-card-overlay"></div><div class="char-card-name">Creeper</div></div>
                <div class="char-card"><div class="char-card-bg" style="background:#1A1A2E;"></div><img class="char-card-img" src="img/enderman.webp" alt="Enderman"><div class="char-card-overlay"></div><div class="char-card-name">Enderman</div></div>
                <div class="char-card"><div class="char-card-bg" style="background:#4A4A4A;"></div><img class="char-card-img" src="img/zombie.webp" alt="Zombie"><div class="char-card-overlay"></div><div class="char-card-name">Zombie</div></div>
                <div class="char-card"><div class="char-card-bg" style="background:#E0E0E0;"></div><img class="char-card-img" src="img/esqueleto.webp" alt="Esqueleto"><div class="char-card-overlay"></div><div class="char-card-name">Esqueleto</div></div>
                <div class="char-card"><div class="char-card-bg" style="background:#2C2C2C;"></div><img class="char-card-img" src="img/esqueleto-wither.webp" alt="Esqueleto Wither"><div class="char-card-overlay"></div><div class="char-card-name">Esqueleto Wither</div></div>
                <div class="char-card"><div class="char-card-bg" style="background:#8B6914;"></div><img class="char-card-img" src="img/aldeano.png" alt="Aldeano"><div class="char-card-overlay"></div><div class="char-card-name">Aldeano</div></div>
                <div class="char-card"><div class="char-card-bg" style="background:#6D4C41;"></div><img class="char-card-img" src="img/lobo.png" alt="Lobo"><div class="char-card-overlay"></div><div class="char-card-name">Lobo</div></div>
                <div class="char-card"><div class="char-card-bg" style="background:#1A1A1A;"></div><img class="char-card-img" src="img/wither.png" alt="Wither"><div class="char-card-overlay"></div><div class="char-card-name">Wither</div></div>
            </div>
        </div>
    </div>

    <script>
        const preguntas = [
            {
                texto: "¿Cómo reaccionas cuando alguien se acerca demasiado a ti?",
                opciones: [
                    { texto: "Me pongo nervioso y exploto sin querer.", mob: "Creeper" },
                    { texto: "Me alejo en silencio y los observo desde lejos.", mob: "Enderman" },
                    { texto: "Me aproximo lentamente sin pensarlo demasiado.", mob: "Zombie" },
                    { texto: "Los apunto desde la distancia antes de que lleguen.", mob: "Esqueleto" }
                ]
            },
            {
                texto: "¿Cuál es tu mayor debilidad?",
                opciones: [
                    { texto: "El agua, me desintegra completamente.", mob: "Creeper" },
                    { texto: "Que me miren directamente a los ojos.", mob: "Enderman" },
                    { texto: "La luz del sol, me destruye poco a poco.", mob: "Zombie" },
                    { texto: "Soy torpe de cerca, necesito distancia para ser efectivo.", mob: "Esqueleto" }
                ]
            },
            {
                texto: "¿Cómo describirías tu personalidad?",
                opciones: [
                    { texto: "Explosivo e impredecible, nunca sabes cuándo voy a estallar.", mob: "Creeper" },
                    { texto: "Misterioso y solitario, prefiero la oscuridad.", mob: "Enderman" },
                    { texto: "Persistente y directo, voy a por lo que quiero sin parar.", mob: "Zombie" },
                    { texto: "Preciso y calculador, espero el momento exacto.", mob: "Esqueleto" }
                ]
            },
            {
                texto: "¿Qué harías si alguien te ataca?",
                opciones: [
                    { texto: "Me abalanzo sobre él aunque eso me destruya también.", mob: "Creeper" },
                    { texto: "Me teletransporto y contraataco desde un ángulo inesperado.", mob: "Enderman" },
                    { texto: "Sigo avanzando sin importarme el daño que recibo.", mob: "Zombie" },
                    { texto: "Mantengo la distancia y lanzo proyectiles sin parar.", mob: "Esqueleto" }
                ]
            },
            {
                texto: "¿Cuál es tu hábitat ideal?",
                opciones: [
                    { texto: "Cualquier lugar, aparezco donde menos te lo esperas.", mob: "Creeper" },
                    { texto: "El End, un lugar oscuro y tranquilo lejos de todo.", mob: "Enderman" },
                    { texto: "Las aldeas de noche, donde hay muchos objetivos cercanos.", mob: "Zombie" },
                    { texto: "Cuevas y mazmorras donde puedo acechar desde las sombras.", mob: "Esqueleto" }
                ]
            },
            {
                texto: "¿Cómo te llevas con los demás?",
                opciones: [
                    { texto: "Soy un solitario, cuando me junto con otros es para el caos.", mob: "Creeper" },
                    { texto: "Prefiero estar solo, no me gustan las multitudes.", mob: "Enderman" },
                    { texto: "Me muevo en hordas, hay fuerza en los números.", mob: "Zombie" },
                    { texto: "Trabajo bien en equipo cuando la situación lo requiere.", mob: "Aldeano" }
                ]
            },
            {
                texto: "¿Qué valoras más en la vida?",
                opciones: [
                    { texto: "La tranquilidad, aunque a veces la rompa sin querer.", mob: "Creeper" },
                    { texto: "Mi espacio personal y que nadie me moleste.", mob: "Enderman" },
                    { texto: "La comunidad y el comercio con los demás.", mob: "Aldeano" },
                    { texto: "La lealtad hacia quien me cuida y me protege.", mob: "Lobo" }
                ]
            },
            {
                texto: "¿Cómo reaccionas ante el peligro?",
                opciones: [
                    { texto: "Me congelo y luego exploto de golpe.", mob: "Creeper" },
                    { texto: "Huyo o me teletransporto para evitar el conflicto.", mob: "Enderman" },
                    { texto: "Avanzo sin miedo, nada me detiene.", mob: "Zombie" },
                    { texto: "Destruyo todo a mi alrededor sin distinción.", mob: "Wither" }
                ]
            },
            {
                texto: "¿Cuál es tu mayor fortaleza?",
                opciones: [
                    { texto: "El factor sorpresa, nadie me ve venir hasta que es tarde.", mob: "Creeper" },
                    { texto: "Mi capacidad de moverme de forma impredecible.", mob: "Enderman" },
                    { texto: "Mi resistencia, aguanto más que nadie.", mob: "Zombie" },
                    { texto: "Mi poder destructivo no tiene rival en este mundo.", mob: "Wither" }
                ]
            },
            {
                texto: "¿Qué tipo de poder te gustaría tener?",
                opciones: [
                    { texto: "La capacidad de hacer explotar cualquier cosa a mi alrededor.", mob: "Creeper" },
                    { texto: "Teleportarme a cualquier lugar en un instante.", mob: "Enderman" },
                    { texto: "Ser prácticamente indestructible y seguir avanzando siempre.", mob: "Zombie" },
                    { texto: "Invocar proyectiles de calavera que destruyan todo.", mob: "Esqueleto-Wither" }
                ]
            },
            {
                texto: "¿Cómo describes tu relación con la oscuridad?",
                opciones: [
                    { texto: "Es mi aliada, en la oscuridad nadie me ve hasta que es tarde.", mob: "Creeper" },
                    { texto: "Soy un ser de las sombras, la luz me resulta incómoda.", mob: "Enderman" },
                    { texto: "Me siento más fuerte cuando no hay luz solar.", mob: "Zombie" },
                    { texto: "La oscuridad es mi hogar natural, soy un ser del inframundo.", mob: "Esqueleto-Wither" }
                ]
            },
            {
                texto: "¿Qué te describe mejor como ser social?",
                opciones: [
                    { texto: "Soy impredecible, nadie sabe cómo voy a reaccionar.", mob: "Creeper" },
                    { texto: "Soy introvertido y me molesta que invadan mi espacio.", mob: "Enderman" },
                    { texto: "Soy pacífico mientras nadie me provoque.", mob: "Aldeano" },
                    { texto: "Soy fiel a quienes me tratan bien y los defiendo sin dudar.", mob: "Lobo" }
                ]
            },
            {
                texto: "¿Cuál sería tu estrategia en una batalla?",
                opciones: [
                    { texto: "Acercarme en silencio y detonar en el momento perfecto.", mob: "Creeper" },
                    { texto: "Teleportarme continuamente para confundir al enemigo.", mob: "Enderman" },
                    { texto: "Avanzar en grupo sin parar hasta abrumar al rival.", mob: "Zombie" },
                    { texto: "Usar proyectiles desde lejos para no exponerme.", mob: "Esqueleto" }
                ]
            },
            {
                texto: "¿Cómo te comportas cuando estás en tu zona de confort?",
                opciones: [
                    { texto: "Deambulo tranquilo hasta que algo me altera.", mob: "Creeper" },
                    { texto: "Recojo bloques y me muevo solo sin molestar a nadie.", mob: "Enderman" },
                    { texto: "Me dedico al comercio e intercambio con quienes me rodean.", mob: "Aldeano" },
                    { texto: "Sigo a mi dueño a todas partes y lo protejo con mi vida.", mob: "Lobo" }
                ]
            },
            {
                texto: "¿Qué te hace único respecto a los demás?",
                opciones: [
                    { texto: "Nadie más puede autodestruirse con tanto impacto.", mob: "Creeper" },
                    { texto: "Soy el único que puede mover bloques y teletransportarse.", mob: "Enderman" },
                    { texto: "Mi poder lo destruye absolutamente todo sin distinción.", mob: "Wither" },
                    { texto: "Soy el más resistente del inframundo y el más letal.", mob: "Esqueleto-Wither" }
                ]
            },
            {
                texto: "¿Cuál es tu filosofía de vida?",
                opciones: [
                    { texto: "Vive el momento aunque ese momento sea una explosión.", mob: "Creeper" },
                    { texto: "El poder absoluto es la única forma de existir.", mob: "Wither" },
                    { texto: "La comunidad y el intercambio son la base de todo.", mob: "Aldeano" },
                    { texto: "La lealtad y el amor incondicional son lo más valioso.", mob: "Lobo" }
                ]
            }
        ];

        const resultados = {
            Creeper: {
                nombre: "Creeper",
                descripcion: "Eres impredecible, silencioso y con una energía explosiva que sorprende a todos. Puedes parecer tranquilo pero cuando algo te altera, el resultado es devastador. Nadie te ve venir hasta que ya es demasiado tarde.",
                imagen: "img/creeper.webp",
                color: "#2D5A1B"
            },
            Enderman: {
                nombre: "Enderman",
                descripcion: "Eres misterioso, solitario y con una sensibilidad especial a que invadan tu espacio. Te mueves de forma impredecible y ves el mundo desde una perspectiva que pocos comprenden. El End es tu hogar y la soledad tu aliada.",
                imagen: "img/enderman.webp",
                color: "#1A1A2E"
            },
            Zombie: {
                nombre: "Zombie",
                descripcion: "Eres persistente, directo y absolutamente imparable una vez que tienes un objetivo. No te detienes ante nada y tu resistencia es tu mayor virtud. Puede que no seas el más rápido pero siempre llegas a donde te propones.",
                imagen: "img/zombie.webp",
                color: "#4A4A4A"
            },
            Esqueleto: {
                nombre: "Esqueleto",
                descripcion: "Eres preciso, calculador y prefieres actuar desde la distancia. No te expones innecesariamente y esperas el momento exacto para actuar. Tu puntería y tu paciencia son tus mejores armas.",
                imagen: "img/esqueleto.webp",
                color: "#BDBDBD"
            },
            "Esqueleto-Wither": {
                nombre: "Esqueleto Wither",
                descripcion: "Eres poderoso, oscuro y perteneces a otro nivel respecto al resto. Habitas en el inframundo y tu sola presencia infunde respeto. Eres más letal que un esqueleto normal y mucho más difícil de detener.",
                imagen: "img/esqueleto-wither.webp",
                color: "#2C2C2C"
            },
            Aldeano: {
                nombre: "Aldeano",
                descripcion: "Eres sociable, pacífico y encuentras valor en el intercambio y la comunidad. No eres el más fuerte pero tu inteligencia social y tu capacidad de negociación te hacen indispensable para quienes te rodean.",
                imagen: "img/aldeano.png",
                color: "#8B6914"
            },
            Lobo: {
                nombre: "Lobo",
                descripcion: "Eres leal, protector y te entregas completamente a quien te da su confianza. Puedes ser independiente y salvaje pero una vez que alguien se gana tu lealtad, los defenderías con todo lo que tienes sin pedir nada a cambio.",
                imagen: "img/lobo.png",
                color: "#6D4C41"
            },
            Wither: {
                nombre: "Wither",
                descripcion: "Eres poder absoluto, destrucción sin límites y una presencia que aterra a todos. No perteneces al mundo normal — eres una fuerza de la naturaleza que arrasa con todo lo que encuentra. Pocos se atreven a enfrentarte.",
                imagen: "img/wither.png",
                color: "#1A1A1A"
            }
        };

        let preguntaActual = 0;
        let puntuaciones = { Creeper:0, Enderman:0, Zombie:0, Esqueleto:0, "Esqueleto-Wither":0, Aldeano:0, Lobo:0, Wither:0 };
        let seleccionActual = null;

        function renderPregunta() {
            const p = preguntas[preguntaActual];
            document.getElementById('questionText').textContent = p.texto;
            document.getElementById('progressNum').textContent = (preguntaActual + 1) + ' / ' + preguntas.length;
            document.getElementById('progressFill').style.width = ((preguntaActual + 1) / preguntas.length * 100) + '%';
            const letras = ['A', 'B', 'C', 'D'];
            const wrap = document.getElementById('optionsWrap');
            wrap.innerHTML = '';
            p.opciones.forEach((op, i) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.innerHTML = `<div class="quiz-option-letter">${letras[i]}</div><div class="quiz-option-text">${op.texto}</div>`;
                btn.onclick = () => seleccionar(btn, op.mob);
                wrap.appendChild(btn);
            });
            seleccionActual = null;
        }

        function seleccionar(btn, mob) {
            document.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            seleccionActual = mob;
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.add('visible');
            const esUltima = preguntaActual === preguntas.length - 1;
            nextBtn.textContent = esUltima ? 'Ver mi resultado →' : 'Siguiente pregunta →';
        }

        function nextQuestion() {
            if (!seleccionActual) return;
            puntuaciones[seleccionActual]++;
            preguntaActual++;
            if (preguntaActual >= preguntas.length) {
                mostrarResultado();
            } else {
                renderPregunta();
            }
        }

        function mostrarResultado() {
            const ganador = Object.keys(puntuaciones).reduce((a, b) => puntuaciones[a] > puntuaciones[b] ? a : b);
            const res = resultados[ganador];
            document.getElementById('resultName').textContent = res.nombre;
            document.getElementById('resultDesc').textContent = res.descripcion;
            document.getElementById('resultImg').src = res.imagen;
            document.getElementById('resultImg').alt = res.nombre;
            document.getElementById('resultBgColor').style.background = res.color;
            document.getElementById('preguntaWrap').style.display = 'none';
            document.getElementById('exitBtn').style.display = 'none';
            document.querySelector('.quiz-chars-btn').style.display = 'none';
            document.getElementById('progressNum').textContent = '✓ Completado';
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('resultCard').classList.add('visible');
        }

        function restartQuiz() {
            preguntaActual = 0;
            puntuaciones = { Creeper:0, Enderman:0, Zombie:0, Esqueleto:0, "Esqueleto-Wither":0, Aldeano:0, Lobo:0, Wither:0 };
            seleccionActual = null;
            document.getElementById('preguntaWrap').style.display = 'block';
            document.getElementById('exitBtn').style.display = 'flex';
            document.querySelector('.quiz-chars-btn').style.display = 'flex';
            document.getElementById('resultCard').classList.remove('visible');
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.style.display = '';
            nextBtn.classList.remove('visible');
            renderPregunta();
        }

        function abrirModal() { document.getElementById('exitModal').classList.add('visible'); }
        function cerrarModal() { document.getElementById('exitModal').classList.remove('visible'); }
        function abrirPersonajes() { document.getElementById('charsModal').classList.add('visible'); }
        function cerrarPersonajes() { document.getElementById('charsModal').classList.remove('visible'); }

        document.getElementById('exitModal').addEventListener('click', function(e) { if (e.target === this) cerrarModal(); });
        document.getElementById('charsModal').addEventListener('click', function(e) { if (e.target === this) cerrarPersonajes(); });

        renderPregunta();
    </script>

</body>
</html>
